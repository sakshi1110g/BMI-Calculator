
<html>
<title>BMI Calculator</title>
<style>* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Cambria, serif;
}

body {
    background: linear-gradient(135deg, #dbeafe, #eff6ff, #e0f2fe);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

h1 {
    color: #1d4ed8;
    margin-bottom: 20px;
    text-align: center;
}

.card {
    background-color: white;
    width: 100%;
    max-width: 460px;
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 2px solid #cbd5e1;
    border-radius: 10px;
    font-size: 18px;
}

input:focus {
    outline: none;
    border-color: #2563eb;
}

.btns {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

.calc {
    background-color: #2563eb;
    color: white;
}

.calc:hover {
    background-color: #1d4ed8;
}

.reset {
    background-color: #ef4444;
    color: white;
}

.reset:hover {
    background-color: #b91c1c;
}

#msg {
    margin-top: 20px;
    line-height: 1.7;
    font-size: 18px;
}

table {
    margin-top: 25px;
    width: 100%;
    max-width: 460px;
    border-collapse: collapse;
    background-color: white;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
}

th,
td {
    border: 1px solid #dddddd;
    padding: 10px;
    text-align: center;
}

th {
    background-color: #2563eb;
    color: white;
}

footer {
    margin-top: 20px;
    color: #555;
}

@media (max-width: 480px) {

    .btns {
        flex-direction: column;
    }

}
</style>
</head>
<body>
<h1>Body Mass Index Calculator</h1>

<div class="card">
<form onsubmit="calculate(event)">
<input type="number" id="w" min="10" max="300" step="any" placeholder="Enter Weight (kg)">
<input type="number" id="h" min="50" max="250" step="any" placeholder="Enter Height (cm)">
<div class="btns">
<button class="calc" type="submit">Calculate</button>
<button class="reset" type="button" onclick="resetData()">Reset</button>
</div>
</form>
<div id="msg"></div>
</div>


<footer>Developed by Sakshi Ghosalkar</footer>

<script>
// Function to calculate BMI
function calculate(event) {

    // Prevent page refresh
    event.preventDefault();

    // Get input fields
    let weight = document.getElementById("w");
    let height = document.getElementById("h");
    let result = document.getElementById("msg");

    // Validate empty fields
    if (weight.value == "") {
        alert("Please enter your weight.");
        weight.focus();
        return;
    }

    if (height.value == "") {
        alert("Please enter your height.");
        height.focus();
        return;
    }

    // Convert input values to numbers
    let wt = parseFloat(weight.value);
    let hcm = parseFloat(height.value);

    // Validate ranges
    if (wt < 10 || wt > 300) {
        alert("Weight should be between 10 and 300 kg.");
        weight.focus();
        return;
    }

    if (hcm < 50 || hcm > 250) {
        alert("Height should be between 50 and 250 cm.");
        height.focus();
        return;
    }

    // Calculate BMI
    let heightInMeters = hcm / 100;
    let bmi = wt / (heightInMeters * heightInMeters);

    let category = "";
    let color = "";

    // BMI categories (Indian Standards)
    if (bmi < 18.5) {
        category = "Underweight";
        color = "#dc2626";
    }
    else if (bmi <= 22.9) {
        category = "Normal";
        color = "#16a34a";
    }
    else if (bmi <= 24.9) {
        category = "Overweight";
        color = "#ea580c";
    }
    else {
        category = "Obese";
        color = "#7e22ce";
    }

    // Display result
    let output = "";

    output += "<h3>Result</h3>";
    output += "<b>Weight:</b> " + wt + " kg<br>";
    output += "<b>Height:</b> " + hcm + " cm<br>";
    output += "<b>BMI:</b> <span style='color:#2563eb'>" + bmi.toFixed(2) + "</span><br>";
    output += "<b>Category (Indian Standards):</b> ";
    output += "<span style='color:" + color + "'>" + category + "</span>";

    result.innerHTML = output;
}

// Function to clear the form
function resetData() {

    document.getElementById("w").value = "";
    document.getElementById("h").value = "";
    document.getElementById("msg").innerHTML = "";

    document.getElementById("w").focus();
}
</script>
</body>
</html>
